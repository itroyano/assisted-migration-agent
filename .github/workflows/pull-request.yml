name: PR Validations

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, stable]

permissions:
  pull-requests: read
  contents: read

jobs:
  # Configuration job - define all shared values once
  config:
    runs-on: ubuntu-latest
    outputs:
      allowed-types: ${{ steps.set-config.outputs.allowed-types }}
      jira-pattern: ${{ steps.set-config.outputs.jira-pattern }}
      jira-required-types: ${{ steps.set-config.outputs.jira-required-types }}
      bot-authors: ${{ steps.set-config.outputs.bot-authors }}
    steps:
      - id: set-config
        run: |
          echo 'allowed-types=["feat","fix","ci","build","chore","docs","refactor","test","style","perf"]' >> $GITHUB_OUTPUT
          echo 'jira-pattern=ECOPROJECT-[0-9]+' >> $GITHUB_OUTPUT
          echo 'jira-required-types=["feat","fix"]' >> $GITHUB_OUTPUT
          echo 'bot-authors=["red-hat-konflux[bot]","dependabot[bot]"]' >> $GITHUB_OUTPUT

  # Validate commit messages
  validate-commits:
    needs: config
    uses: kubev2v/migration-planner-workflows/.github/workflows/validate-commit-messages.yml@main
    with:
      types: ${{ needs.config.outputs.allowed-types }}
      jira-pattern: ${{ needs.config.outputs.jira-pattern }}
      jira-required-types: ${{ needs.config.outputs.jira-required-types }}
      skip-authors: ${{ needs.config.outputs.bot-authors }}

  # Validate PR title and description
  validate-pr-title:
    needs: config
    uses: kubev2v/migration-planner-workflows/.github/workflows/validate-pr-title-description.yml@main
    with:
      allowed-types: ${{ needs.config.outputs.allowed-types }}
      jira-pattern: ${{ needs.config.outputs.jira-pattern }}
      jira-required-types: ${{ needs.config.outputs.jira-required-types }}
      skip-authors: ${{ needs.config.outputs.bot-authors }}

  lint:
    name: Lint
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run golangci-lint
        run: make lint

  format-check:
    name: Format Check
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Check code formatting
        run: make check-format

  tidy-check:
    name: Go Mod Tidy Check
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Check go.mod and go.sum are tidy
        run: make tidy-check

  check-generate:
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Check generated files are up to date
        run: |
          make check-generate
          # The Makefile only checks for uncommitted changes, allowing users to keep untracked files in the repository.
          # Here, we also check for untracked files, as none are expected at this stage.
          if [[ $(git ls-files --others --exclude-standard) ]]; then git ls-files --others --exclude-standard; echo "These files are not tracked by git"; exit 1; fi

  verify-build:
    name: Verify Build
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify code compiles
        run: make build

  unit-test:
    needs: [validate-commits, validate-pr-title]
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: Run the tests
      run: make test
